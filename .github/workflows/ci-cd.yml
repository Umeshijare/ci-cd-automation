name: Simple CI/CD

on:
  push:
    branches:
      - main

jobs:
  build-run:
    runs-on: ubuntu-latest

    steps:
      # 1. Get code
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Build backend
      - name: Build Backend
        run: docker build -t backend ./backend

      # 3. Build frontend
      - name: Build Frontend
        run: docker build -t frontend ./frontend

      # 4. Run containers
      - name: Run Backend
        run: docker run -d -p 5000:5000 --name backend backend

      - name: Run Frontend
        run: docker run -d -p 3000:80 --name frontend frontend

      # 5. Test backend API
      - name: Test Backend
        run: |
          sleep 5
          curl http://localhost:5000/api
