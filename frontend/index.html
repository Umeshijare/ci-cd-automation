<!DOCTYPE html>
<html>
<head>
  <title>DevOps App</title>
</head>
<body>
  <h1>umesh is Running 🚀</h1>
  <button onclick="getData()">Get Backend Data</button>
  <p id="result"></p>

  <script>
    async function getData() {
      const res = await fetch("http://backend:5000/api");
      const data = await res.json();
      document.getElementById("result").innerText = data.message;
    }
  </script>
</body>
</html>
